<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAS Portal</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 引入 Google Fonts: Fira Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- 引入 Google Identity Services SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0891B2',
                        secondary: '#22D3EE',
                        cta: '#22C55E',
                        background: '#ECFEFF',
                        darkText: '#164E63',
                    },
                    fontFamily: {
                        sans: ['Fira Sans', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { background-color: #ECFEFF; color: #164E63; }
        .spa-section { display: none; }
        .active { display: block; }
        .skeleton { background: linear-gradient(90deg, #CFFAFE 25%, #A5F3FC 50%, #CFFAFE 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(8, 145, 178, 0.1); }
    </style>
</head>

<body class="font-sans antialiased">
    <!-- 讀取中遮罩 -->
    <div id="loading-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-white/80">
        <div class="w-12 h-12 border-4 border-cyan-100 border-t-primary rounded-full animate-spin"></div>
    </div>

    <!-- 登入區塊 -->
    <section id="login-section" class="spa-section min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-primary to-darkText">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden p-8 text-center">
            <div class="mb-6 flex justify-center">
                <div class="bg-cyan-50 p-4 rounded-2xl text-primary">
                    <i data-lucide="shield-check" class="w-12 h-12"></i>
                </div>
            </div>
            <h1 id="loginSiteName" class="text-3xl font-bold text-gray-900 mb-2 italic">載入中...</h1>
            <p class="text-gray-500 mb-8 leading-relaxed">歡迎使用校務管理系統<br>請使用 Google 帳號安全登入</p>
            <div class="flex justify-center" id="g_id_signin"></div>
            <div class="mt-8 text-xs text-gray-400">© 2026 GAS Portal OAuth2</div>
        </div>
    </section>

    <!-- 主應用程式區塊 -->
    <section id="app-section" class="spa-section min-h-screen">
        <!-- 浮動導覽列 -->
        <nav class="fixed top-4 left-4 right-4 z-40">
            <div class="max-w-7xl mx-auto glass-card rounded-2xl shadow-lg px-6 py-3 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-primary text-white p-2 rounded-lg">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-primary" id="navbarBrand">Portal</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right hidden sm:block">
                        <div id="userName" class="font-semibold text-darkText leading-tight">使用者</div>
                        <div id="userRole" class="text-xs text-cyan-600 font-medium px-2 py-0.5 bg-cyan-100 rounded-full inline-block mt-1">身分</div>
                    </div>
                    <button onclick="handleSignOut()" class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all duration-200 cursor-pointer">
                        <i data-lucide="log-out" class="w-6 h-6"></i>
                    </button>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto pt-28 pb-12 px-6">
            <!-- 動態儀表板容器 -->
            <div id="dashboard-content">
                <!-- 骨架屏載入中 -->
                <div id="welcome-dashboard" class="dashboard-section active">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="h-32 skeleton rounded-2xl"></div>
                        <div class="h-32 skeleton rounded-2xl"></div>
                        <div class="h-32 skeleton rounded-2xl"></div>
                    </div>
                    <div class="h-64 skeleton rounded-2xl"></div>
                </div>

                <!-- 管理員儀表板 -->
                <div id="admin-dashboard" class="dashboard-section space-y-8" style="display:none;">
                    <div class="flex items-end justify-between">
                        <div>
                            <h1 class="text-3xl font-extrabold text-darkText tracking-tight">系統主控台</h1>
                            <p class="text-cyan-600 mt-1">歡迎回來，系統管理員。這是目前的系統狀態。</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="glass-card p-6 rounded-3xl hover:shadow-xl transition-shadow cursor-pointer">
                            <div class="flex justify-between items-start mb-4">
                                <div class="p-3 bg-blue-50 text-blue-600 rounded-2xl"><i data-lucide="users" class="w-6 h-6"></i></div>
                                <span class="text-green-500 text-xs font-bold">+12%</span>
                            </div>
                            <div class="text-2xl font-bold text-gray-900">1,284</div>
                            <div class="text-gray-500 text-sm">活躍使用者</div>
                        </div>
                        <div class="glass-card p-6 rounded-3xl hover:shadow-xl transition-shadow cursor-pointer">
                            <div class="flex justify-between items-start mb-4">
                                <div class="p-3 bg-purple-50 text-purple-600 rounded-2xl"><i data-lucide="activity" class="w-6 h-6"></i></div>
                                <span class="text-purple-500 text-xs font-bold">穩定</span>
                            </div>
                            <div class="text-2xl font-bold text-gray-900">99.9%</div>
                            <div class="text-gray-500 text-sm">系統在線率</div>
                        </div>
                        <div class="glass-card p-6 rounded-3xl hover:shadow-xl transition-shadow cursor-pointer">
                            <div class="flex justify-between items-start mb-4">
                                <div class="p-3 bg-amber-50 text-amber-600 rounded-2xl"><i data-lucide="settings" class="w-6 h-6"></i></div>
                            </div>
                            <div class="text-2xl font-bold text-gray-900">24</div>
                            <div class="text-gray-500 text-sm">待處理設定</div>
                        </div>
                        <div class="glass-card p-6 rounded-3xl hover:shadow-xl transition-shadow cursor-pointer bg-cta text-white border-none">
                            <div class="flex justify-between items-start mb-4">
                                <div class="p-3 bg-white/20 text-white rounded-2xl"><i data-lucide="plus-circle" class="w-6 h-6"></i></div>
                            </div>
                            <div class="text-lg font-bold">新增帳號</div>
                            <div class="text-white/80 text-sm italic">快速授權新使用者</div>
                        </div>
                    </div>
                </div>

                <!-- 導師儀表板 -->
                <div id="teacher-dashboard" class="dashboard-section space-y-8" style="display:none;">
                    <h1 class="text-3xl font-extrabold text-darkText tracking-tight">導師工作區</h1>
                    <div class="glass-card rounded-3xl overflow-hidden">
                        <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-white/50">
                            <h3 class="font-bold text-lg flex items-center gap-2"><i data-lucide="users" class="w-5 h-5 text-primary"></i> 我的學生清單</h3>
                            <button class="text-primary text-sm font-semibold hover:underline">查看全部</button>
                        </div>
                        <div class="p-8 text-center text-gray-400">
                            <i data-lucide="database" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                            <p id="teacherMessage">正在從後端安全存取學生資料...</p>
                        </div>
                    </div>
                </div>

                <!-- 學生儀表板 -->
                <div id="student-dashboard" class="dashboard-section space-y-8" style="display:none;">
                    <h1 class="text-3xl font-extrabold text-darkText tracking-tight">個人中心</h1>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="glass-card p-8 rounded-3xl border-l-8 border-cyan-500">
                            <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="book-open" class="w-6 h-6 text-primary"></i> 學習進度</h3>
                            <div class="w-full bg-cyan-100 rounded-full h-4 mb-2">
                                <div class="bg-primary h-4 rounded-full" style="width: 75%"></div>
                            </div>
                            <span class="text-sm font-medium">已完成 75% 的課程</span>
                        </div>
                        <div class="glass-card p-8 rounded-3xl border-l-8 border-green-500">
                            <h3 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="award" class="w-6 h-6 text-cta"></i> 最新成績</h3>
                            <div class="text-4xl font-black text-darkText">A+</div>
                            <p class="text-sm text-gray-500 mt-2">計算機科學概論</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 未授權區塊 -->
    <section id="unauthorized-section" class="spa-section min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full glass-card rounded-3xl p-10 text-center border-t-8 border-red-500">
            <div class="mb-6 text-red-500 flex justify-center">
                <i data-lucide="lock" class="w-16 h-16"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 mb-4">存取遭拒</h1>
            <div id="unauthorizedMessage" class="bg-red-50 text-red-700 p-4 rounded-2xl mb-8 text-sm leading-relaxed">
                您的帳號尚未被授權存取此應用程式。
            </div>
            <button onclick="location.reload()" class="w-full bg-primary text-white font-bold py-4 rounded-2xl hover:opacity-90 shadow-lg shadow-cyan-200 transition-all cursor-pointer flex items-center justify-center gap-2">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i> 重新登入
            </button>
        </div>
    </section>

    <script>
        let currentUser = null;
        let idToken = null;
        let websiteParams = {};

        window.addEventListener('load', function () {
            loadWebsiteParameters();
            lucide.createIcons(); // 初始化圖標
        });

        function loadWebsiteParameters() {
            google.script.run
                .withSuccessHandler(function (paramsJson) {
                    websiteParams = JSON.parse(paramsJson);
                    const siteName = websiteParams['網站名稱'] || 'GAS Portal';
                    const clientId = websiteParams['OAuth Client ID'];

                    document.getElementById('navbarBrand').textContent = siteName;
                    document.getElementById('loginSiteName').textContent = siteName;
                    document.title = siteName;

                    if (clientId) {
                        initGoogleAuth(clientId);
                    } else {
                        showError('系統尚未設定 OAuth Client ID，請聯絡管理員。');
                    }
                })
                .withFailureHandler(function (err) {
                    showError('無法載入系統參數：' + err);
                })
                .getWebsiteParameters();
        }

        function initGoogleAuth(clientId) {
            google.accounts.id.initialize({
                client_id: clientId,
                callback: handleCredentialResponse,
                auto_select: true
            });
            google.accounts.id.renderButton(
                document.getElementById("g_id_signin"),
                { theme: "outline", size: "large", width: "250", shape: "pill" }
            );
            google.accounts.id.prompt();
            showSection('login-section');
            hideLoading();
        }

        function handleCredentialResponse(response) {
            showLoading();
            idToken = response.credential;
            google.script.run
                .withSuccessHandler(function(resJson) {
                    const res = JSON.parse(resJson);
                    if (res.status === 'success') {
                        currentUser = res.user;
                        loginSuccess();
                    } else {
                        showUnauthorized(res.message);
                    }
                    hideLoading();
                })
                .withFailureHandler(function(err) {
                    showError('伺服器驗證失敗：' + err);
                    hideLoading();
                })
                .loginWithToken(idToken);
        }

        function loginSuccess() {
            document.getElementById('userName').textContent = currentUser['姓名'];
            document.getElementById('userRole').textContent = currentUser['角色'];
            renderDashboard(currentUser['角色']);
            showSection('app-section');
            lucide.createIcons(); // 為動態產生的區塊重新建立圖標
        }

        function renderDashboard(role) {
            document.querySelectorAll('.dashboard-section').forEach(d => d.style.display = 'none');
            let dashboardId = 'welcome-dashboard';
            if (role === 'admin' || role === '管理員') dashboardId = 'admin-dashboard';
            else if (role === 'teacher' || role === '導師') dashboardId = 'teacher-dashboard';
            else if (role === 'student' || role === '學生') dashboardId = 'student-dashboard';
            
            const target = document.getElementById(dashboardId);
            if (target) target.style.display = 'block';
        }

        function handleSignOut() {
            google.accounts.id.disableAutoSelect();
            idToken = null;
            currentUser = null;
            showSection('login-section');
        }

        function showSection(sectionId) {
            document.querySelectorAll('.spa-section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
        }

        function showUnauthorized(message) {
            document.getElementById('unauthorizedMessage').textContent = message;
            showSection('unauthorized-section');
            lucide.createIcons();
        }

        function showError(message) { alert(message); hideLoading(); }
        function showLoading() { document.getElementById('loading-overlay').style.display = 'flex'; }
        function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }
    </script>
</body>

</html>
